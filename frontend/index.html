<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle de Caçambas</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 30px;
        }

        h1 {
            color: #0a7c4a;
        }

        h2 {
            color: #1b5e20;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th {
            background: black;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        button {
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            opacity: 0.9;
        }

        input {
            padding: 8px;
            width: 250px;
            margin-bottom: 10px;
            display: block;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Sistema de Controle de Estoque de Caçambas</h1>

<!-- RESUMO -->
<div id="resumo" style="display: flex; gap: 20px; margin-bottom: 20px; font-size: 18px; font-weight: bold;">
    <div id="disponiveis" style="background-color: #e8f8f1; color: #1e8449; padding: 10px 15px; border-radius: 5px;">
        🟢 Disponíveis: 0
    </div>

    <div id="alugadas" style="background-color: #fdecea; color: #c0392b; padding: 10px 15px; border-radius: 5px;">
        🔴 Alugadas: 0
    </div>
</div>

<!-- CAÇAMBAS -->
<div class="box">
    <h2>Lista de Caçambas (50 unidades - 4m³)</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Número</th>
                <th>Status</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="lista"></tbody>
    </table>
</div>

<!-- CLIENTES -->
<div class="box" id="cadastroCliente">
    <h2>Cadastro de Cliente</h2>

    <input type="text" id="nome" placeholder="Nome do cliente">
    <input type="text" id="cpf_cnpj" placeholder="CPF ou CNPJ">
    <input type="text" id="endereco" placeholder="Endereço da obra">
    <input type="text" id="telefone" placeholder="Telefone">
    <input type="email" id="email" placeholder="Email">

    <button style="background-color:#0a7c4a;" onclick="cadastrarCliente()">Cadastrar Cliente</button>
</div>

<div class="box">
    <h2>Lista de Clientes</h2>

    <button style="background-color:black;" onclick="buscarClientes()">Carregar Clientes</button>

    <!-- 🔥 BOTÃO NOVO -->
    <button style="background-color:#c0392b;" onclick="limparTelaClientes()">
        Limpar Tela
    </button>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Documento</th>
                <th>Endereço da Obra</th>
                <th>Telefone</th>
            </tr>
        </thead>
        <tbody id="listaClientes"></tbody>
    </table>
</div>

<script>
const API = "http://127.0.0.1:5000";

// =========================
// CAÇAMBAS
// =========================
async function carregar() {
    const response = await fetch(API + "/cacambas");
    const dados = await response.json();

    const tabela = document.getElementById("lista");
    tabela.innerHTML = "";

    let disponiveis = 0;
    let alugadas = 0;

    dados.forEach(c => {

        if (c.status === "disponivel") {
            disponiveis++;
        } else {
            alugadas++;
        }

        tabela.innerHTML += `
            <tr>
                <td>${c.id}</td>
                <td>${c.numero}</td>
                <td style="color:${c.status === 'disponivel' ? 'green' : 'red'}; font-weight:bold;">
                    ${c.status}
                </td>
                <td>
                    <button 
                        style="background-color:${c.status === 'disponivel' ? '#c0392b' : '#27ae60'}"
                        onclick="alterarStatus(${c.id}, '${c.status}')">
                        ${c.status === 'disponivel' ? 'Alugar' : 'Liberar'}
                    </button>
                </td>
            </tr>
        `;
    });

    document.getElementById("disponiveis").innerHTML = `🟢 Disponíveis: ${disponiveis}`;
    document.getElementById("alugadas").innerHTML = `🔴 Alugadas: ${alugadas}`;
}

async function alterarStatus(id, statusAtual) {

    if (statusAtual === "disponivel") {
        document.getElementById("cadastroCliente").scrollIntoView({
            behavior: "smooth"
        });
        return;
    }

    const novoStatus = "disponivel";

    await fetch(API + "/cacambas/" + id, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: novoStatus })
    });

    carregar();
}

// =========================
// CLIENTES
// =========================
function cadastrarCliente() {
    const data = {
        nome: document.getElementById("nome").value,
        cpf_cnpj: document.getElementById("cpf_cnpj").value,
        endereco: document.getElementById("endereco").value,
        telefone: document.getElementById("telefone").value,
        email: document.getElementById("email").value
    };

    fetch(API + "/clientes", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("Cliente cadastrado com sucesso!");
        buscarClientes();

        document.getElementById("nome").value = "";
        document.getElementById("cpf_cnpj").value = "";
        document.getElementById("endereco").value = "";
        document.getElementById("telefone").value = "";
        document.getElementById("email").value = "";
    });
}

function buscarClientes() {
    fetch(API + "/clientes")
    .then(res => res.json())
    .then(clientes => {
        const tabela = document.getElementById("listaClientes");
        tabela.innerHTML = "";

        clientes.forEach(c => {
            tabela.innerHTML += `
                <tr>
                    <td>${c.nome}</td>
                    <td>${c.cpf_cnpj}</td>
                    <td>${c.endereco}</td>
                    <td>${c.telefone}</td>
                </tr>
            `;
        });
    });
}

// 🔥 FUNÇÃO NOVA
function limparTelaClientes() {
    document.getElementById("listaClientes").innerHTML = "";
}

carregar();
</script>

</body>
</html>
