<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>VPB Caçambas</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f4f6f8;
    margin: 0;
}

/* HEADER */
.header {
    background: #0a7c4a;
    color: white;
    padding: 18px 30px;
    display: flex;
    align-items: center;
    gap: 15px;
}

.header img {
    width: 55px;
    background: white;
    padding: 6px;
    border-radius: 8px;
}

/* CONTAINER */
.container {
    padding: 30px;
}

/* BOX */
.box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    margin-bottom: 25px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* TÍTULOS */
h3 {
    color: #0a7c4a;
}

/* TABELA */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #0a7c4a;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    text-align: center;
}

tr:hover {
    background: #f2f2f2;
}

/* SCROLL CAÇAMBAS */
.tabela-cacambas {
    max-height: 300px;
    overflow-y: auto;
    margin-top: 10px;
}

/* STATUS */
.status-disponivel { color: #0a7c4a; font-weight: bold; }
.status-alugada { color: #c0392b; font-weight: bold; }

/* BOTÕES */
button {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.btn-alugar { background: #c0392b; color: white; }
.btn-liberar { background: #0a7c4a; color: white; }

/* INPUT */
input {
    padding: 10px;
    margin-bottom: 10px;
    width: 260px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* MENSAGEM */
#mensagem {
    background: #e8f8f1;
    color: #0a7c4a;
    padding: 10px;
    border-radius: 6px;
    margin-top: 10px;
}

/* FOOTER */
.footer {
    background: #e8f5ee;
    color: #0a7c4a;
    padding: 25px;
    text-align: center;
}

.footer-icons {
    display: flex;
    justify-content: center;
    gap: 30px;
}

.footer-icons div {
    display: flex;
    align-items: center;
    gap: 8px;
}

.footer-icons img {
    width: 20px;
}
</style>
</head>

<body>

<div class="header">
    <img src="logo.png?v=2">
    <h2>VPB Caçambas</h2>
</div>

<div class="container">

<!-- CAÇAMBAS -->
<div class="box">
<h3>Controle de Caçambas</h3>

<div class="tabela-cacambas">
<table>
<thead>
<tr>
<th>ID</th>
<th>Caçamba</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>
</div>

<!-- CADASTRO -->
<div class="box" id="cadastroCliente">
<h3>Cadastro de Cliente</h3>

<input id="nome" placeholder="Nome">
<input id="cpf_cnpj" placeholder="CPF/CNPJ">
<input id="endereco" placeholder="Endereço">
<input id="telefone" placeholder="Telefone">
<input id="email" placeholder="Email">

<button onclick="cadastrarCliente()" class="btn-liberar">Cadastrar</button>

<p id="mensagem"></p>
</div>

<!-- CLIENTES -->
<div class="box">
<h3>Clientes</h3>
<button onclick="buscarClientes()">Carregar</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Documento</th>
<th>Endereço</th>
<th>Telefone</th>
<th>Email</th>
</tr>
</thead>

<tbody id="listaClientes"></tbody>
</table>
</div>

<!-- LOCAÇÕES -->
<div class="box">
<h3>Locações</h3>
<button onclick="carregarLocacoes()">Carregar</button>

<table>
<thead>
<tr>
<th>Cliente</th>
<th>Caçamba</th>
<th>Entrega</th>
<th>Retirada</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tabelaLocacoes"></tbody>
</table>
</div>

</div>

<div class="footer">
<strong>VPB Caçambas</strong>

<div class="footer-icons">
    <div>
        <img src="whatsapp.png?v=2">
        <span>(11) 4863-2581</span>
    </div>
    <div>
        <img src="email.png?v=2">
        <span>financeiro@vpbcacamba.com</span>
    </div>
</div>

<p>🏗️ Mais de 30 anos de experiência</p>
</div>

<script>
const API = "http://127.0.0.1:5000";
let cacambaSelecionada = null;

function formatarData(dataISO) {
    return new Date(dataISO).toLocaleDateString('pt-BR');
}

async function carregar() {
    const res = await fetch(API + "/cacambas");
    const dados = await res.json();

    lista.innerHTML = "";

    dados.forEach(c => {
        lista.innerHTML += `
        <tr>
            <td>${c.id}</td>
            <td>${c.numero}</td>
            <td class="${c.status === 'disponivel' ? 'status-disponivel' : 'status-alugada'}">${c.status}</td>
            <td>
                <button onclick="alterarStatus(${c.id}, '${c.status}')">
                    ${c.status === 'disponivel' ? 'Alugar' : 'Liberar'}
                </button>
            </td>
        </tr>`;
    });
}

async function alterarStatus(id, status) {
    if (status !== "disponivel") {
        alert("Já está alugada");
        return;
    }

    cacambaSelecionada = id;

    await fetch(API + "/cacambas/" + id, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({status:"alugada"})
    });

    carregar();

    document.getElementById("cadastroCliente").scrollIntoView({
        behavior: "smooth"
    });
}

function cadastrarCliente() {

    if (!cacambaSelecionada) {
        alert("Selecione uma caçamba!");
        return;
    }

    fetch(API + "/clientes", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            nome: nome.value,
            cpf_cnpj: cpf_cnpj.value,
            endereco: endereco.value,
            telefone: telefone.value,
            email: email.value
        })
    })
    .then(() => fetch(API + "/clientes"))
    .then(r => r.json())
    .then(clientes => {

        const ultimo = clientes[clientes.length - 1];

        return fetch(API + "/locacoes", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                cliente_id: ultimo.id,
                cacamba_id: cacambaSelecionada,
                data_entrega: new Date().toISOString().split('T')[0],
                data_retirada: new Date(Date.now()+3*86400000).toISOString().split('T')[0],
                status: "Ativa"
            })
        });

    })
    .then(() => {
        mensagem.innerText = "Locação registrada!";
        carregarLocacoes();

        nome.value = "";
        cpf_cnpj.value = "";
        endereco.value = "";
        telefone.value = "";
        email.value = "";

        cacambaSelecionada = null;
    });
}

function buscarClientes() {
    fetch(API + "/clientes")
    .then(r => r.json())
    .then(d => {
        listaClientes.innerHTML = "";
        d.forEach(c => {
            listaClientes.innerHTML += `
            <tr>
                <td>${c.nome}</td>
                <td>${c.cpf_cnpj}</td>
                <td>${c.endereco}</td>
                <td>${c.telefone}</td>
                <td>${c.email}</td>
            </tr>`;
        });
    });
}

async function carregarLocacoes() {
    const [resL, resC, resCa] = await Promise.all([
        fetch(API+"/locacoes"),
        fetch(API+"/clientes"),
        fetch(API+"/cacambas")
    ]);

    const loc = await resL.json();
    const cli = await resC.json();
    const cac = await resCa.json();

    tabelaLocacoes.innerHTML = "";

    loc.forEach(l => {
        const cliente = cli.find(c=>c.id===l.cliente_id);
        const cacamba = cac.find(c=>c.id===l.cacamba_id);

        tabelaLocacoes.innerHTML += `
        <tr>
            <td>${cliente?.nome || "-"}</td>
            <td>${cacamba?.numero || "-"}</td>
            <td>${formatarData(l.data_entrega)}</td>
            <td>${formatarData(l.data_retirada)}</td>
            <td style="color:#0a7c4a;font-weight:bold;">
                ${l.status || "Ativa"}
            </td>
        </tr>`;
    });
}

carregar();
</script>

</body>
</html>
